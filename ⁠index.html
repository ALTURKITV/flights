<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تركي العالمية لمسارات الطيران</title>
    <script src="//unpkg.com/globe.gl"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #globeViz {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            width: 320px;
            background: rgba(15, 15, 26, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffcc;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00ffcc;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #12121f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 150px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            border-radius: 0 0 6px 6px;
        }
        .search-results div {
            padding: 10px;
            cursor: pointer;
        }
        .search-results div:hover {
            background: rgba(0, 255, 204, 0.2);
        }
        .stats {
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .stat-label { color: #8a8a9e; }
        .stat-value { color: #00ffcc; font-weight: bold; }
        .share-btn {
            display: block;
            text-align: center;
            background: #1da1f2;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .share-btn:hover { background: #1a91da; }
    </style>
</head>
<body>

<div id="globeViz"></div>

<div class="ui-container">
    <div class="brand">منصة ALTURKITV لمسارات الطيران</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="ابحث عن دولة...">
        <div id="searchResults" class="search-results"></div>
    </div>
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">الدولة المختارة:</span>
            <span id="current-country" class="stat-value">-</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">عدد المحاور:</span>
            <span id="stat-hubs" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">إجمالي المسارات:</span>
            <span id="stat-routes" class="stat-value">0</span>
        </div>
    </div>
    <a id="x-share-link" class="share-btn" target="_blank">مشاركة على منصة X</a>
</div>

<script>
    // بيانات المطارات العالمية الافتراضية
    const airports = {
        'RUH': { lat: 24.957, lng: 46.698 }, 
        'JED': { lat: 21.679, lng: 39.156 }, 
        'DXB': { lat: 25.253, lng: 55.364 }, 
        'LHR': { lat: 51.470, lng: -0.454 }, 
        'JFK': { lat: 40.641, lng: -73.778 }, 
        'CDG': { lat: 49.009, lng: 2.547 },  
        'HND': { lat: 35.549, lng: 139.780 }, 
        'CAI': { lat: 30.122, lng: 31.406 }  
    };

    // بيانات الدول ومسارات الطيران
    const countriesData = [
        {
            name: 'المملكة العربية السعودية',
            code: 'SA',
            routes: [
                { from: 'RUH', to: 'LHR' },
                { from: 'RUH', to: 'DXB' },
                { from: 'RUH', to: 'JFK' },
                { from: 'JED', to: 'CDG' },
                { from: 'JED', to: 'CAI' }
            ]
        },
        {
            name: 'الإمارات العربية المتحدة',
            code: 'AE',
            routes: [
                { from: 'DXB', to: 'LHR' },
                { from: 'DXB', to: 'JFK' },
                { from: 'DXB', to: 'HND' }
            ]
        },
        {
            name: 'المملكة المتحدة',
            code: 'GB',
            routes: [
                { from: 'LHR', to: 'JFK' },
                { from: 'LHR', to: 'CDG' }
            ]
        }
    ];

    // تهيئة الكرة الأرضية ثلاثية الأبعاد
    const globe = Globe()
        (document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
        .arcColor(() => '#00ffcc')
        .arcDashLength(0.4)
        .arcDashGap(0.2)
        .arcDashAnimateTime(1500)
        .arcStroke(1.5);

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', (e) => {
        const value = e.target.value.toLowerCase();
        searchResults.innerHTML = '';
        if (!value) {
            searchResults.style.display = 'none';
            return;
        }

        const filtered = countriesData.filter(c => c.name.toLowerCase().includes(value));
        if (filtered.length > 0) {
            filtered.forEach(country => {
                const div = document.createElement('div');
                div.innerText = country.name;
                div.addEventListener('click', () => {
                    selectCountry(country);
                    searchResults.style.display = 'none';
                    searchInput.value = country.name;
                });
                searchResults.appendChild(div);
            });
            searchResults.style.display = 'block';
        } else {
            searchResults.style.display = 'none';
        }
    });

    // إغلاق قائمة البحث عند الضغط في أي مكان خارجي لضمان سلامة الواجهة
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            searchResults.style.display = 'none';
        }
    });

    // دالة معالجة وعرض مسارات الدولة المختارة وتحديد الواجهة الإحصائية
    function selectCountry(country) {
        const routes = country.routes;

        const formattedArcs = routes.map(route => {
            const start = airports[route.from];
            const end = airports[route.to];
            return {
                startLat: start.lat,
                startLng: start.lng,
                endLat: end.lat,
                endLng: end.lng
            };
        });

        // رسم المسارات الجديدة
        globe.arcsData(formattedArcs);

        // تدوير ذكي وانسيابي للكرة الأرضية نحو مطار الإقلاع الأساسي للدولة المختارة
        if (routes.length > 0) {
            const primaryHub = airports[routes[0].from];
            globe.pointOfView({ lat: primaryHub.lat, lng: primaryHub.lng, alt: 1.75 }, 1600);
        }

        // تحديد لوحة التحكم رقمياً
        document.getElementById('current-country').innerText = country.name;
        const uniqueHubs = new Set(routes.map(r => r.from)).size;
        document.getElementById('stat-hubs').innerText = uniqueHubs;
        document.getElementById('stat-routes').innerText = routes.length;

        // هندسة نص التغريدة لضمان انتشارها الواسع وجلب حركة تفاعلية لحسابك
        const tweetText = encodeURIComponent(`شاهدوا شبكة مسارات الطيران الدولية الحية لـ ${country.name} عبر منصة @ALTURKITV التفاعلية! ✈️🌍`);
        document.getElementById('x-share-link').href = `https://twitter.com/intent/tweet?text=${tweetText}`;
    }

    // تفعيل افتراضي فوري على "المملكة العربية السعودية" لمنح انطباع أول مبهر
    setTimeout(() => {
        const defaultCountry = countriesData.find(c => c.code === 'SA');
        selectCountry(defaultCountry);
    }, 1200);

    // إعادة ضبط الأبعاد دائماً ومقاومة البعد الرسومي عند تغيير حجم شاشات الجوال أو الكمبيوتر
    window.addEventListener('resize', () => {
        globe.width(window.innerWidth).height(window.innerHeight);
    });
</script>
</body>
</html>
